<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" width="900" height="320">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06060e"/>
      <stop offset="50%" stop-color="#0c0c1d"/>
      <stop offset="100%" stop-color="#06060e"/>
    </linearGradient>
    <linearGradient id="sep" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06060e"/>
      <stop offset="20%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="80%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#06060e"/>
    </linearGradient>
    <radialGradient id="orb1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c084fc" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f472b6" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#f472b6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="320" fill="url(#bg)"/>

  <!-- Subtle Grid -->
  <g stroke="#818cf8" stroke-opacity="0.03" stroke-width="0.5">
    <line x1="0" y1="40" x2="900" y2="40"/><line x1="0" y1="80" x2="900" y2="80"/>
    <line x1="0" y1="120" x2="900" y2="120"/><line x1="0" y1="160" x2="900" y2="160"/>
    <line x1="0" y1="200" x2="900" y2="200"/><line x1="0" y1="240" x2="900" y2="240"/>
    <line x1="0" y1="280" x2="900" y2="280"/>
    <line x1="60" y1="0" x2="60" y2="320"/><line x1="120" y1="0" x2="120" y2="320"/>
    <line x1="180" y1="0" x2="180" y2="320"/><line x1="240" y1="0" x2="240" y2="320"/>
    <line x1="300" y1="0" x2="300" y2="320"/><line x1="360" y1="0" x2="360" y2="320"/>
    <line x1="420" y1="0" x2="420" y2="320"/><line x1="480" y1="0" x2="480" y2="320"/>
    <line x1="540" y1="0" x2="540" y2="320"/><line x1="600" y1="0" x2="600" y2="320"/>
    <line x1="660" y1="0" x2="660" y2="320"/><line x1="720" y1="0" x2="720" y2="320"/>
    <line x1="780" y1="0" x2="780" y2="320"/><line x1="840" y1="0" x2="840" y2="320"/>
  </g>

  <!-- Animated Ambient Orbs -->
  <circle cx="140" cy="100" r="120" fill="url(#orb1)">
    <animate attributeName="cx" values="140;200;140" dur="14s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="100;180;100" dur="18s" repeatCount="indefinite"/>
    <animate attributeName="r" values="120;150;120" dur="10s" repeatCount="indefinite"/>
  </circle>
  <circle cx="750" cy="220" r="100" fill="url(#orb2)">
    <animate attributeName="cx" values="750;680;750" dur="16s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="220;130;220" dur="12s" repeatCount="indefinite"/>
    <animate attributeName="r" values="100;140;100" dur="14s" repeatCount="indefinite"/>
  </circle>
  <circle cx="450" cy="50" r="80" fill="url(#orb3)">
    <animate attributeName="cx" values="450;500;450" dur="20s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="50;100;50" dur="15s" repeatCount="indefinite"/>
    <animate attributeName="r" values="80;110;80" dur="12s" repeatCount="indefinite"/>
  </circle>

  <!-- ===== Neural Network Left Side ===== -->
  <g>
    <!-- Connection Lines (subtle) -->
    <line x1="70" y1="80" x2="155" y2="130" stroke="#6366f1" stroke-opacity="0.15" stroke-width="1">
      <animate attributeName="stroke-opacity" values="0.08;0.25;0.08" dur="4s" repeatCount="indefinite"/>
    </line>
    <line x1="70" y1="80" x2="155" y2="200" stroke="#818cf8" stroke-opacity="0.12" stroke-width="1">
      <animate attributeName="stroke-opacity" values="0.06;0.2;0.06" dur="5s" repeatCount="indefinite"/>
    </line>
    <line x1="70" y1="200" x2="155" y2="130" stroke="#a855f7" stroke-opacity="0.12" stroke-width="1">
      <animate attributeName="stroke-opacity" values="0.06;0.22;0.06" dur="4.5s" repeatCount="indefinite"/>
    </line>
    <line x1="70" y1="200" x2="155" y2="200" stroke="#6366f1" stroke-opacity="0.15" stroke-width="1">
      <animate attributeName="stroke-opacity" values="0.08;0.25;0.08" dur="3.5s" repeatCount="indefinite"/>
    </line>
    <line x1="70" y1="280" x2="155" y2="200" stroke="#818cf8" stroke-opacity="0.12" stroke-width="1">
      <animate attributeName="stroke-opacity" values="0.06;0.2;0.06" dur="5.5s" repeatCount="indefinite"/>
    </line>
    <line x1="70" y1="280" x2="155" y2="270" stroke="#c084fc" stroke-opacity="0.12" stroke-width="1">
      <animate attributeName="stroke-opacity" values="0.06;0.2;0.06" dur="4.2s" repeatCount="indefinite"/>
    </line>

    <!-- Layer 2 to 3 -->
    <line x1="155" y1="130" x2="250" y2="160" stroke="#a855f7" stroke-opacity="0.15" stroke-width="1">
      <animate attributeName="stroke-opacity" values="0.08;0.3;0.08" dur="3.8s" repeatCount="indefinite"/>
    </line>
    <line x1="155" y1="200" x2="250" y2="160" stroke="#6366f1" stroke-opacity="0.15" stroke-width="1">
      <animate attributeName="stroke-opacity" values="0.08;0.28;0.08" dur="4.3s" repeatCount="indefinite"/>
    </line>
    <line x1="155" y1="270" x2="250" y2="160" stroke="#818cf8" stroke-opacity="0.12" stroke-width="1">
      <animate attributeName="stroke-opacity" values="0.06;0.22;0.06" dur="5s" repeatCount="indefinite"/>
    </line>
    <line x1="155" y1="130" x2="250" y2="240" stroke="#c084fc" stroke-opacity="0.1" stroke-width="1">
      <animate attributeName="stroke-opacity" values="0.05;0.18;0.05" dur="4.8s" repeatCount="indefinite"/>
    </line>
    <line x1="155" y1="200" x2="250" y2="240" stroke="#a855f7" stroke-opacity="0.12" stroke-width="1">
      <animate attributeName="stroke-opacity" values="0.06;0.2;0.06" dur="3.6s" repeatCount="indefinite"/>
    </line>
    <line x1="155" y1="270" x2="250" y2="240" stroke="#6366f1" stroke-opacity="0.15" stroke-width="1">
      <animate attributeName="stroke-opacity" values="0.08;0.25;0.08" dur="4.1s" repeatCount="indefinite"/>
    </line>

    <!-- Layer 3 to Output -->
    <line x1="250" y1="160" x2="340" y2="110" stroke="#f43f5e" stroke-opacity="0.2" stroke-width="1.2">
      <animate attributeName="stroke-opacity" values="0.1;0.35;0.1" dur="3s" repeatCount="indefinite"/>
    </line>
    <line x1="250" y1="160" x2="340" y2="185" stroke="#3b82f6" stroke-opacity="0.2" stroke-width="1.2">
      <animate attributeName="stroke-opacity" values="0.1;0.35;0.1" dur="3.4s" repeatCount="indefinite"/>
    </line>
    <line x1="250" y1="160" x2="340" y2="260" stroke="#10b981" stroke-opacity="0.2" stroke-width="1.2">
      <animate attributeName="stroke-opacity" values="0.1;0.35;0.1" dur="3.7s" repeatCount="indefinite"/>
    </line>
    <line x1="250" y1="240" x2="340" y2="110" stroke="#f43f5e" stroke-opacity="0.15" stroke-width="1">
      <animate attributeName="stroke-opacity" values="0.07;0.25;0.07" dur="4s" repeatCount="indefinite"/>
    </line>
    <line x1="250" y1="240" x2="340" y2="185" stroke="#3b82f6" stroke-opacity="0.15" stroke-width="1">
      <animate attributeName="stroke-opacity" values="0.07;0.25;0.07" dur="4.5s" repeatCount="indefinite"/>
    </line>
    <line x1="250" y1="240" x2="340" y2="260" stroke="#10b981" stroke-opacity="0.15" stroke-width="1">
      <animate attributeName="stroke-opacity" values="0.07;0.25;0.07" dur="3.2s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- Input Layer Nodes -->
  <circle cx="70" cy="80" r="6" fill="#a5b4fc">
    <animate attributeName="r" values="5;7;5" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="70" cy="200" r="7" fill="#a5b4fc">
    <animate attributeName="r" values="6;8;6" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;1;0.7" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="70" cy="280" r="5" fill="#a5b4fc">
    <animate attributeName="r" values="4;6;4" dur="2.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2.8s" repeatCount="indefinite"/>
  </circle>

  <!-- Hidden Layer Nodes -->
  <circle cx="155" cy="130" r="7" fill="#a5b4fc">
    <animate attributeName="r" values="6;8;6" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;1;0.7" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="155" cy="200" r="8" fill="#c084fc">
    <animate attributeName="r" values="7;10;7" dur="3.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;1;0.8" dur="3.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="155" cy="270" r="6" fill="#a5b4fc">
    <animate attributeName="r" values="5;7;5" dur="3.7s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;1;0.7" dur="3.7s" repeatCount="indefinite"/>
  </circle>

  <!-- Deep Layer Nodes -->
  <circle cx="250" cy="160" r="9" fill="#c084fc">
    <animate attributeName="r" values="8;11;8" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;1;0.8" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="250" cy="240" r="7" fill="#a5b4fc">
    <animate attributeName="r" values="6;8;6" dur="4.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;1;0.7" dur="4.2s" repeatCount="indefinite"/>
  </circle>

  <!-- Output Layer Nodes (Sentiment Classes) -->
  <circle cx="340" cy="110" r="8" fill="#f43f5e">
    <animate attributeName="r" values="7;10;7" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;1;0.8" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="340" cy="185" r="8" fill="#3b82f6">
    <animate attributeName="r" values="7;10;7" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;1;0.8" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="340" cy="260" r="8" fill="#10b981">
    <animate attributeName="r" values="7;10;7" dur="3.3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;1;0.8" dur="3.3s" repeatCount="indefinite"/>
  </circle>

  <!-- Output labels -->
  <text x="358" y="114" font-family="monospace" font-size="9" fill="#f43f5e" opacity="0.9">Kritik</text>
  <text x="358" y="189" font-family="monospace" font-size="9" fill="#3b82f6" opacity="0.9">Netral</text>
  <text x="358" y="264" font-family="monospace" font-size="9" fill="#10b981" opacity="0.9">Pro</text>

  <!-- Layer labels -->
  <text x="45" y="50" font-family="monospace" font-size="8" fill="#94a3b8" opacity="0.8">Input</text>
  <text x="130" y="100" font-family="monospace" font-size="8" fill="#94a3b8" opacity="0.8">Hidden</text>
  <text x="230" y="135" font-family="monospace" font-size="8" fill="#94a3b8" opacity="0.8">Deep</text>
  <text x="320" y="85" font-family="monospace" font-size="8" fill="#94a3b8" opacity="0.8">Output</text>

  <!-- Floating particles -->
  <circle cx="100" cy="150" r="1.5" fill="#818cf8" opacity="0.4">
    <animate attributeName="cy" values="150;40;150" dur="12s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.6;0" dur="12s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="280" r="1" fill="#c084fc" opacity="0.3">
    <animate attributeName="cy" values="280;60;280" dur="15s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.5;0" dur="15s" repeatCount="indefinite"/>
  </circle>
  <circle cx="300" cy="300" r="1.2" fill="#f0abfc" opacity="0.3">
    <animate attributeName="cy" values="300;80;300" dur="18s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.4;0" dur="18s" repeatCount="indefinite"/>
  </circle>
  <circle cx="500" cy="310" r="1" fill="#818cf8" opacity="0.3">
    <animate attributeName="cy" values="310;50;310" dur="14s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.5;0" dur="14s" repeatCount="indefinite"/>
  </circle>
  <circle cx="650" cy="290" r="1.5" fill="#a5b4fc" opacity="0.3">
    <animate attributeName="cy" values="290;70;290" dur="16s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.6;0" dur="16s" repeatCount="indefinite"/>
  </circle>
  <circle cx="800" cy="270" r="1" fill="#c084fc" opacity="0.2">
    <animate attributeName="cy" values="270;30;270" dur="13s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.4;0" dur="13s" repeatCount="indefinite"/>
  </circle>
  <circle cx="420" cy="295" r="1.3" fill="#f0abfc" opacity="0.3">
    <animate attributeName="cy" values="295;55;295" dur="17s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.5;0" dur="17s" repeatCount="indefinite"/>
  </circle>
  <circle cx="560" cy="305" r="0.8" fill="#818cf8" opacity="0.2">
    <animate attributeName="cy" values="305;45;305" dur="11s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.4;0" dur="11s" repeatCount="indefinite"/>
  </circle>

  <!-- ===== Right Side: Title & Branding ===== -->

  <!-- Accent line with glow -->
  <rect x="430" y="142" width="420" height="1.5" fill="url(#sep)" rx="1">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="4s" repeatCount="indefinite"/>
  </rect>
  <!-- Glow dots on line ends -->
  <circle cx="435" cy="143" r="3" fill="#6366f1" opacity="0.8">
    <animate attributeName="r" values="2;4;2" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="845" cy="143" r="3" fill="#ec4899" opacity="0.8">
    <animate attributeName="r" values="2;4;2" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;1;0.5" dur="3.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Main Title: INDOBERTWEET - using solid color instead of gradient fill -->
  <text x="435" y="115" font-family="sans-serif" font-size="40" font-weight="800" fill="#c4b5fd" letter-spacing="3">INDOBERTWEET</text>

  <!-- Subtitle -->
  <text x="438" y="168" font-family="sans-serif" font-size="12" font-weight="600" fill="#8b92a5" letter-spacing="5">SENTIMENT ANALYZER · LCC KALBAR</text>

  <!-- Description -->
  <text x="438" y="200" font-family="sans-serif" font-size="11" fill="#cbd5e1" letter-spacing="0.5">Klasifikasi sentimen 6.000 komentar YouTube menggunakan</text>
  <text x="438" y="216" font-family="sans-serif" font-size="11" fill="#cbd5e1" letter-spacing="0.5">model Fine-Tuned IndoBERTweet dengan akurasi 93.28%</text>

  <!-- Stats Boxes -->
  <!-- Box 1: Dataset -->
  <rect x="438" y="238" width="110" height="52" rx="10" fill="#0f0f1e" fill-opacity="0.6" stroke="#818cf8" stroke-opacity="0.12" stroke-width="1">
    <animate attributeName="stroke-opacity" values="0.08;0.2;0.08" dur="4s" repeatCount="indefinite"/>
  </rect>
  <text x="493" y="261" font-family="monospace" font-size="16" font-weight="700" fill="#e0e7ff" text-anchor="middle">6,000</text>
  <text x="493" y="280" font-family="sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Dataset</text>

  <!-- Box 2: Accuracy -->
  <rect x="560" y="238" width="110" height="52" rx="10" fill="#0f0f1e" fill-opacity="0.6" stroke="#818cf8" stroke-opacity="0.12" stroke-width="1">
    <animate attributeName="stroke-opacity" values="0.08;0.2;0.08" dur="4.5s" repeatCount="indefinite"/>
  </rect>
  <text x="615" y="261" font-family="monospace" font-size="16" font-weight="700" fill="#e0e7ff" text-anchor="middle">93.28%</text>
  <text x="615" y="280" font-family="sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Akurasi</text>

  <!-- Box 3: Classes -->
  <rect x="682" y="238" width="110" height="52" rx="10" fill="#0f0f1e" fill-opacity="0.6" stroke="#818cf8" stroke-opacity="0.12" stroke-width="1">
    <animate attributeName="stroke-opacity" values="0.08;0.2;0.08" dur="3.8s" repeatCount="indefinite"/>
  </rect>
  <text x="737" y="261" font-family="monospace" font-size="16" font-weight="700" fill="#e0e7ff" text-anchor="middle">3</text>
  <text x="737" y="280" font-family="sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Kelas Sentimen</text>

  <!-- Bottom separator -->
  <rect x="0" y="316" width="900" height="4" fill="url(#sep)" opacity="0.6">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="5s" repeatCount="indefinite"/>
  </rect>
</svg>
