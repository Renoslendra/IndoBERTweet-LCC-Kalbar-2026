      <stop offset="20%" stop-color="#6366f1" stop-opacity="0.5"/>
      <stop offset="40%" stop-color="#a855f7" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#ec4899" stop-opacity="0.7"/>
      <stop offset="60%" stop-color="#a855f7" stop-opacity="0.6"/>
      <stop offset="80%" stop-color="#6366f1" stop-opacity="0.5"/>
